name: Fancode Playlist Update

on:
  schedule:
    - cron: "0 * * * *"   # প্রতি 1 ঘন্টা
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Requests
        run: pip install requests

      - name: Run Script
        env:
          FANCODE_API: ${{ secrets.FANCODE_API }}
        run: python Fancode_playlist.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Fancode.m3u
          git commit -m "🔄 Update Fancode Playlist" || echo "No changes"
          git push
