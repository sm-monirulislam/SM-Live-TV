name: Update Fancode Playlist

on:
  schedule:
    - cron: "*/30 * * * *"   # প্রতি 30 মিনিটে run
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: 📦 Install requests
        run: pip install requests

      - name: 🚀 Run script
        env:
          API_URL: ${{ secrets.API_URL }}
        run: python Fancode_playlist.py

      - name: 💾 Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Fancode.m3u
          git commit -m "🔄 Auto update Fancode playlist" || echo "No changes"
          git push
