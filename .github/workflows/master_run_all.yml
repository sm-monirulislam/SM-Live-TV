name: Run All Playlist Updates (Main Controller)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  id-token: write

jobs:
  crichd:
    uses: ./.github/workflows/CricHD_update_playlist.yml
    secrets: inherit

  main_combined:
    needs: crichd
    if: always()
    uses: ./.github/workflows/main_combined.yml
    secrets: inherit
