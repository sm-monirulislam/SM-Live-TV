name: Run All Playlist Updates (Main Controller)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  id-token: write

jobs:
  fancode:
    uses: ./.github/workflows/Fancode_update.yml
    secrets: inherit

  toffee:
    needs: fancode
    if: always()
    uses: ./.github/workflows/toffee_main.yml
    secrets: inherit

  aynaott:
    needs: toffee
    if: always()
    uses: ./.github/workflows/auto_aynaott.yml
    secrets: inherit

  main_combined:
    needs: aynaott
    if: always()
    uses: ./.github/workflows/main_combined.yml
    secrets: inherit
