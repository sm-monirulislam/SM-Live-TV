name: Run All Playlist Updates (Main Controller)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  id-token: write

jobs:
  fancode:
    uses: ./.github/workflows/Fancode_update.yml
    secrets: inherit

  toffee:
    needs: fancode
    if: always()
    uses: ./.github/workflows/toffee_main.yml
    secrets: inherit

  aynaott:
    needs: toffee
    if: always()
    uses: ./.github/workflows/auto_aynaott.yml
    secrets: inherit

  roar:
    needs: aynaott
    if: always()
    uses: ./.github/workflows/roar.yml
    secrets: inherit

  tapmad:                 # <--- নতুন Tapmad জব যুক্ত করা হলো
    needs: roar
    if: always()
    uses: ./.github/workflows/Tapmad_bd.yml # নিশ্চিত করুন ফাইলের নাম এইটাই
    secrets: inherit       # এর মাধ্যমে গিটহাব সিক্রেট (API URL) পাস হবে

  main_combined:
    needs: tapmad         # <--- এখন এটি tapmad-এর পর রান হবে
    if: always()
    uses: ./.github/workflows/main_combined.yml
    secrets: inherit
