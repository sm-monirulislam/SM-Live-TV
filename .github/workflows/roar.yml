name: Generate RoarZone Playlist

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install requests
        run: pip install requests

      - name: Run script
        env:
          API_URL: ${{ secrets.API_URL }}
        run: python Script/RoarZone.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add RoarZone.m3u
          git commit -m "🔄 Auto update playlist" || echo "No changes"

          git pull --rebase
          git push
