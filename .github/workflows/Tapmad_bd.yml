name: Tapmad Playlist BD

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
  workflow_call:     # এটি দিলে Master Controller একে কল করতে পারবে

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # পুরো গিট হিস্ট্রি নেওয়ার জন্য, যা রিব্যাস (rebase) করতে সাহায্য করবে

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Python script
      env:
        TAPMAD_API_URL: ${{ secrets.TAPMAD_API_URL }}
      run: python Script/Tapmad_bd.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # ফাইলটি পরিবর্তন হয়েছে কিনা তা চেক করে অ্যাড করা
        git add Tapmad.m3u
        
        # কোনো পরিবর্তন না থাকলে যেন এরর না দেয় (exit 0)
        git commit -m "Automated Tapmad Playlist Update" || exit 0
        
        # অন্য কোনো জব আগে পুশ করে থাকলে, সেই পরিবর্তনগুলো আগে টেনে আনা
        git pull --rebase origin main
        
        # ফাইনালি পুশ করা
        git push origin main
